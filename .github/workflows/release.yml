name: Release Desktop Installers

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: "nsis,msi"
            artifact_name: prevu-windows-bundles
            artifact_paths: |
              target/release/bundle/**/*.msi
              target/release/bundle/**/*.exe
          - os: macos-latest
            bundles: "app,dmg"
            artifact_name: prevu-macos-bundles
            artifact_paths: |
              target/release/bundle/**/*.dmg
              target/release/bundle/macos/**/*.app
              target/release/bundle/macos/**/*.app/**
          - os: ubuntu-latest
            bundles: "appimage,deb"
            artifact_name: prevu-linux-bundles
            artifact_paths: |
              target/release/bundle/**/*.AppImage
              target/release/bundle/**/*.deb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install Linux system dependencies (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            imagemagick

      - name: Install macOS system dependencies
        if: matrix.os == 'macos-latest'
        run: brew install imagemagick

      - name: Setup Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            . -> target

      - name: Install root npm dependencies
        run: npm ci

      - name: Install frontend npm dependencies
        run: npm --prefix frontend ci

      - name: Generate Tauri icons from logo.png
        run: npm run tauri -- icon logo.png

      - name: Build Tauri app
        run: npm run tauri -- build --bundles ${{ matrix.bundles }}

      - name: Upload build artifact (for release job)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 1
          path: ${{ matrix.artifact_paths }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display downloaded files
        run: find artifacts/ -type f | sort

      - name: Flatten artifacts into release-files/
        run: |
          mkdir -p release-files
          find artifacts/ -type f \( \
            -name "*.exe" \
            -o -name "*.msi" \
            -o -name "*.dmg" \
            -o -name "*.AppImage" \
            -o -name "*.deb" \
          \) -exec cp {} release-files/ \;
          echo "--- Files to be released ---"
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PREVU ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## PREVU ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | 🪟 Windows | `.exe` (NSIS installer) or `.msi` |
            | 🍎 macOS | `.dmg` |
            | 🐧 Linux | `.AppImage` or `.deb` |

            > **Note:** macOS and Windows builds are not code-signed.
            > You may need to allow the app through Gatekeeper (macOS) or SmartScreen (Windows).
          files: release-files/*
